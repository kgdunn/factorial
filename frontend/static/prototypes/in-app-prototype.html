<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>factori.al — In-app prototype</title>
<meta name="viewport" content="width=1440"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#E9E3D1;min-height:100vh;font-family:'Inter Tight',system-ui,sans-serif;color:#26241E;-webkit-font-smoothing:antialiased}
  .stage{min-height:100vh;padding:28px;display:flex;flex-direction:column;align-items:center;gap:20px}
  .proto-meta{display:flex;align-items:center;gap:18px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#8C8576;padding:4px 0}
  .proto-meta .dot{width:5px;height:5px;border-radius:50%;background:#B57A57}
  .proto-meta .crumb{color:#26241E}
  .screen-nav{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding:6px 0 0}
  .screen-nav span{font-family:'Inter Tight',sans-serif;font-size:12px;padding:5px 11px;border-radius:999px;background:#F7F4EC;border:1px solid #E4DEC9;color:#5A5649;cursor:pointer}
  .screen-nav span.active{background:#26241E;color:#F7F4EC;border-color:#26241E}
  button{font-family:inherit}
  input,textarea{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
// shared.jsx — shared primitives: wordmark, icons, chrome, sidebar, global styles

const C = {
  paper: '#F7F4EC',
  paper2: '#EFEADB',
  paper3: '#E6E0CE',
  ink: '#26241E',
  inkSoft: '#5A5649',
  inkFaint: '#8C8576',
  rule: '#D9D2BE',
  ruleSoft: '#E4DEC9',
  clay: '#B57A57',
  clayInk: '#7D4E31',
  clayTint: '#F5ECE2',
  moss: '#5F7361',
  sky: '#8BA4B8',
};

const F = {
  serif: "'Instrument Serif', serif",
  sans: "'Inter Tight', system-ui, sans-serif",
  mono: "'JetBrains Mono', monospace",
};

// Scatter dot SVG (brand mark) - inline
function ScatterDot({ size = 12, color = C.ink, accent = C.clay, style }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" style={style}>
      <circle cx="6" cy="15" r="1.7" fill={color}/>
      <circle cx="11" cy="9" r="1.7" fill={color}/>
      <circle cx="17" cy="13" r="1.7" fill={color}/>
      <circle cx="13" cy="18" r="1.7" fill={accent}/>
    </svg>
  );
}

// Wordmark
function Wordmark({ size = 20, onClick }) {
  return (
    <span onClick={onClick} style={{
      fontFamily: F.serif, fontStyle: 'italic', fontSize: size, lineHeight: 1,
      color: C.ink, display: 'inline-flex', alignItems: 'baseline',
      letterSpacing: '-0.015em', cursor: onClick ? 'pointer' : 'default',
    }}>
      factori
      <span style={{ display: 'inline-flex', width: '0.32em', height: '0.32em', margin: '0 0.05em 0.12em', alignItems:'center', justifyContent:'center' }}>
        <ScatterDot size="100%"/>
      </span>
      <span style={{ color: C.clayInk }}>al</span>
    </span>
  );
}

// Minimal SVG icons (line style)
const Ico = {
  home:   <path d="M3 10 L10 3 L17 10 M5 9 V17 H15 V9" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round"/>,
  folder: <path d="M3 6 H8 L10 4 H17 V16 H3 Z" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round"/>,
  chat:   <path d="M3 5 H17 V13 H10 L6 16 V13 H3 Z" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round"/>,
  table:  <path d="M3 5 H17 V15 H3 Z M3 9 H17 M9 5 V15" fill="none" stroke="currentColor" strokeWidth="1.4"/>,
  chart:  <path d="M3 17 V3 M3 17 H17 M6 13 L9 9 L12 11 L16 6" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round"/>,
  cube:   <path d="M10 3 L17 7 V13 L10 17 L3 13 V7 Z M10 3 V10 M3 7 L10 10 L17 7" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round"/>,
  contour:<g fill="none" stroke="currentColor" strokeWidth="1.4"><ellipse cx="10" cy="10" rx="6" ry="4"/><ellipse cx="10" cy="10" rx="3" ry="2"/><circle cx="10" cy="10" r="0.8" fill="currentColor"/></g>,
  gear:   <g fill="none" stroke="currentColor" strokeWidth="1.4"><circle cx="10" cy="10" r="2.4"/><path d="M10 3.5 V5.5 M10 14.5 V16.5 M3.5 10 H5.5 M14.5 10 H16.5 M5.4 5.4 L6.8 6.8 M13.2 13.2 L14.6 14.6 M5.4 14.6 L6.8 13.2 M13.2 6.8 L14.6 5.4"/></g>,
  plus:   <path d="M10 4 V16 M4 10 H16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/>,
  arrow:  <path d="M4 10 H16 M12 6 L16 10 L12 14" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>,
  check:  <path d="M4 10 L8 14 L16 5" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>,
  close:  <path d="M5 5 L15 15 M15 5 L5 15" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>,
  dots:   <g fill="currentColor"><circle cx="5" cy="10" r="1.3"/><circle cx="10" cy="10" r="1.3"/><circle cx="15" cy="10" r="1.3"/></g>,
  search: <g fill="none" stroke="currentColor" strokeWidth="1.4"><circle cx="9" cy="9" r="4.5"/><path d="M12.5 12.5 L16 16" strokeLinecap="round"/></g>,
  sparkle:<path d="M10 3 L11.5 8.5 L17 10 L11.5 11.5 L10 17 L8.5 11.5 L3 10 L8.5 8.5 Z" fill="currentColor"/>,
  download:<path d="M10 3 V13 M6 9 L10 13 L14 9 M4 16 H16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>,
};

function Icon({ name, size = 18, color = 'currentColor', style }) {
  return (
    <svg width={size} height={size} viewBox="0 0 20 20" style={{ color, ...style }}>
      {Ico[name]}
    </svg>
  );
}

// Browser chrome (light, brand-aligned)
function Chrome({ url, children, onBack, onForward }) {
  return (
    <div style={{
      width: 1360, height: 860, borderRadius: 14, overflow: 'hidden',
      boxShadow: '0 40px 80px -30px rgba(38,36,30,0.35), 0 0 0 1px rgba(38,36,30,0.08)',
      display: 'flex', flexDirection: 'column', background: C.paper2, margin: '0 auto',
    }}>
      {/* Traffic lights + tab */}
      <div style={{ height: 40, background: C.paper3, display:'flex', alignItems:'center', padding:'0 14px', gap: 16, borderBottom:`1px solid ${C.rule}` }}>
        <div style={{ display:'flex', gap:8 }}>
          <div style={{ width:12,height:12,borderRadius:'50%',background:'#E89B8F' }}/>
          <div style={{ width:12,height:12,borderRadius:'50%',background:'#E8C77A' }}/>
          <div style={{ width:12,height:12,borderRadius:'50%',background:'#9FB88E' }}/>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8, background: C.paper, padding:'6px 12px', borderRadius: 8, border:`1px solid ${C.ruleSoft}`, minWidth: 260 }}>
          <ScatterDot size={12}/>
          <span style={{ fontFamily: F.sans, fontSize: 12, color: C.ink }}>factori.al — Yield · Reactor B</span>
          <Icon name="close" size={12} color={C.inkFaint} style={{ marginLeft: 'auto' }}/>
        </div>
      </div>
      {/* URL bar */}
      <div style={{ height: 42, background: C.paper2, display:'flex', alignItems:'center', gap:10, padding:'0 16px', borderBottom:`1px solid ${C.rule}` }}>
        <button onClick={onBack} style={{ background:'transparent', border:'none', color: C.inkFaint, cursor:'pointer', padding:4 }}>
          <svg width="18" height="18" viewBox="0 0 20 20"><path d="M13 4 L6 10 L13 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <button onClick={onForward} style={{ background:'transparent', border:'none', color: C.inkFaint, cursor:'pointer', padding:4 }}>
          <svg width="18" height="18" viewBox="0 0 20 20"><path d="M7 4 L14 10 L7 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <div style={{ flex:1, height: 28, background: C.paper, borderRadius: 999, border:`1px solid ${C.ruleSoft}`, display:'flex', alignItems:'center', padding:'0 14px', gap:8, fontFamily: F.mono, fontSize: 12, color: C.inkSoft }}>
          <div style={{ width:10, height:10, borderRadius:2, border:`1.5px solid ${C.moss}`, position:'relative' }}>
            <div style={{ position:'absolute', inset:1, background: C.moss, opacity:.7 }}/>
          </div>
          <span style={{ color: C.inkFaint }}>app.factori.al</span>
          <span>{url}</span>
        </div>
        <Icon name="dots" size={18} color={C.inkFaint}/>
      </div>
      {/* App body */}
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden', background: C.paper }}>
        {children}
      </div>
    </div>
  );
}

// App sidebar
function Sidebar({ current, go, project }) {
  const items = [
    { id: 'projects', label: 'Projects', icon: 'folder' },
    { id: 'divider' },
    { id: 'chat', label: 'Agent', icon: 'chat', section: true },
    { id: 'runsheet', label: 'Run-sheet', icon: 'table', section: true },
    { id: 'entry', label: 'Enter results', icon: 'plus', section: true },
    { id: 'divider2' },
    { id: 'effects', label: 'Effects', icon: 'chart', section: true },
    { id: 'contour', label: 'Contour', icon: 'contour', section: true },
    { id: 'surface', label: '3D surface', icon: 'cube', section: true },
    { id: 'divider3' },
    { id: 'settings', label: 'Settings', icon: 'gear' },
  ];

  return (
    <div style={{
      width: 232, background: C.paper2, borderRight:`1px solid ${C.rule}`,
      display:'flex', flexDirection:'column', flexShrink: 0,
    }}>
      <div style={{ padding:'22px 22px 16px', borderBottom:`1px solid ${C.rule}` }}>
        <Wordmark size={22} onClick={() => go('projects')}/>
      </div>
      {project && (
        <div style={{ padding:'16px 22px 12px', borderBottom:`1px solid ${C.rule}` }}>
          <div style={{ fontFamily: F.mono, fontSize: 9, letterSpacing:'.2em', textTransform:'uppercase', color: C.inkFaint, marginBottom: 6 }}>project</div>
          <div style={{ fontFamily: F.serif, fontStyle:'italic', fontSize: 20, color: C.ink, lineHeight: 1.15 }}>{project.name}</div>
          <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, marginTop: 6 }}>{project.meta}</div>
        </div>
      )}
      <div style={{ padding: '14px 12px', flex: 1, overflow:'auto' }}>
        {items.map((it, i) => {
          if (it.id?.startsWith('divider')) return <div key={i} style={{ height:1, background: C.rule, margin:'10px 10px' }}/>;
          const active = current === it.id;
          const dim = it.section && !project;
          return (
            <div key={it.id} onClick={() => !dim && go(it.id)} style={{
              display:'flex', alignItems:'center', gap: 12, padding:'9px 12px',
              borderRadius: 8, cursor: dim ? 'not-allowed' : 'pointer',
              background: active ? C.clayTint : 'transparent',
              color: dim ? C.inkFaint : (active ? C.clayInk : C.ink),
              fontFamily: F.sans, fontSize: 13.5, fontWeight: active ? 500 : 400,
              opacity: dim ? 0.5 : 1,
              marginBottom: 2,
            }}>
              <Icon name={it.icon} size={16}/>
              <span>{it.label}</span>
              {active && <div style={{ marginLeft:'auto', width: 4, height: 4, borderRadius: '50%', background: C.clay }}/>}
            </div>
          );
        })}
      </div>
      <div style={{ padding:'16px 22px', borderTop:`1px solid ${C.rule}`, display:'flex', alignItems:'center', gap:10 }}>
        <div style={{ width: 28, height: 28, borderRadius:'50%', background: C.ink, color: C.paper, display:'flex', alignItems:'center', justifyContent:'center', fontFamily: F.mono, fontSize:11 }}>KD</div>
        <div style={{ lineHeight:1.2 }}>
          <div style={{ fontFamily: F.sans, fontSize: 12, color: C.ink }}>Kevin Dunn</div>
          <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint }}>reactor-b · eu</div>
        </div>
      </div>
    </div>
  );
}

// Top bar (inside app)
function TopBar({ title, breadcrumb, actions, tabs, activeTab, onTab }) {
  return (
    <div style={{ borderBottom: `1px solid ${C.rule}`, background: C.paper }}>
      <div style={{ display:'flex', alignItems:'center', padding:'20px 36px', gap: 20 }}>
        <div style={{ flex: 1 }}>
          {breadcrumb && (
            <div style={{ fontFamily: F.mono, fontSize: 10, letterSpacing:'.18em', textTransform:'uppercase', color: C.inkFaint, marginBottom: 4 }}>
              {breadcrumb}
            </div>
          )}
          <div style={{ fontFamily: F.serif, fontStyle:'italic', fontSize: 32, color: C.ink, lineHeight: 1.1, letterSpacing:'-0.01em' }}>
            {title}
          </div>
        </div>
        {actions && <div style={{ display:'flex', gap: 10 }}>{actions}</div>}
      </div>
      {tabs && (
        <div style={{ display:'flex', gap:4, padding:'0 28px' }}>
          {tabs.map(t => (
            <div key={t} onClick={() => onTab(t)} style={{
              padding:'10px 16px', fontFamily: F.sans, fontSize: 13,
              color: activeTab === t ? C.ink : C.inkFaint, cursor:'pointer',
              borderBottom: activeTab === t ? `2px solid ${C.clay}` : '2px solid transparent',
              marginBottom: -1,
            }}>{t}</div>
          ))}
        </div>
      )}
    </div>
  );
}

// Button primitives
function Btn({ children, onClick, variant = 'ghost', size = 'md', icon, style }) {
  const base = {
    fontFamily: F.sans, fontSize: size === 'sm' ? 12 : 13, fontWeight: 500,
    padding: size === 'sm' ? '7px 12px' : '9px 16px',
    borderRadius: 999, border: '1px solid transparent', cursor:'pointer',
    display:'inline-flex', alignItems:'center', gap: 8, whiteSpace:'nowrap',
  };
  const v = {
    primary: { background: C.ink, color: C.paper },
    clay:    { background: C.clay, color: '#fff' },
    ghost:   { background: 'transparent', color: C.ink, borderColor: C.rule },
    chip:    { background: C.paper2, color: C.ink, borderColor: C.ruleSoft },
  }[variant];
  return (
    <button onClick={onClick} style={{ ...base, ...v, ...style }}>
      {icon && <Icon name={icon} size={14}/>}
      {children}
    </button>
  );
}



// ==================================

// screens-a.jsx — Projects, Empty, Chat, Run-sheet, Entry


const PROJECTS = [
  { id: 'yield-q2', name: 'Yield · Reactor B', meta: 'DoE · 2² + 4 cp · 8 runs', status: 'running', progress: 6, total: 8, updated: '2h ago', owner: 'KD' },
  { id: 'binder',   name: 'Binder formulation', meta: 'Mixture · Scheffé · 10 runs', status: 'analysed', progress: 10, total: 10, updated: 'yesterday', owner: 'KD' },
  { id: 'coating',  name: 'Coating thickness · line 3', meta: 'CCD · rotatable · 17 runs', status: 'draft', progress: 0, total: 17, updated: '3d ago', owner: 'MT' },
  { id: 'sensory',  name: 'Brine sensory panel', meta: '2³ factorial · 8 runs + 3 cp', status: 'done', progress: 11, total: 11, updated: 'Apr 3', owner: 'AR' },
  { id: 'print',    name: 'Infill vs. tensile', meta: 'Plackett–Burman · 12 runs', status: 'running', progress: 7, total: 12, updated: '5h ago', owner: 'KD' },
];

const STATUS_STYLE = {
  running: { bg:'#F5ECE2', color: C.clayInk, dot: C.clay, label: 'running' },
  analysed:{ bg:'#E8EFE8', color: '#3C5240',  dot: C.moss, label: 'analysed' },
  done:    { bg: C.paper2, color: C.inkSoft,  dot: C.inkFaint, label: 'closed' },
  draft:   { bg: C.paper2, color: C.inkFaint, dot: C.inkFaint, label: 'draft' },
};

function StatusPill({ s }) {
  const st = STATUS_STYLE[s];
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:6, padding:'3px 9px', borderRadius:999, background: st.bg, color: st.color, fontFamily: F.mono, fontSize: 10, letterSpacing:'.12em', textTransform:'uppercase' }}>
      <span style={{ width:5, height:5, borderRadius:'50%', background: st.dot }}/>
      {st.label}
    </span>
  );
}

function Screen_Projects({ go }) {
  return (
    <div style={{ flex:1, overflow:'auto', background: C.paper }}>
      <TopBar
        breadcrumb="workspace · Reactor B team"
        title={<>Projects</>}
        actions={<>
          <Btn variant="ghost" icon="search" size="sm">Search</Btn>
          <Btn variant="primary" icon="plus" onClick={() => go('empty')}>New experiment</Btn>
        </>}
      />
      <div style={{ padding:'28px 36px 60px' }}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap: 14, marginBottom: 32 }}>
          {[
            { k:'active', v:'3', l:'experiments running'},
            { k:'pending', v:'14', l:'runs to enter'},
            { k:'decided', v:'2', l:'awaiting sign-off'},
            { k:'last week', v:'+4', l:'effects identified'},
          ].map(s => (
            <div key={s.k} style={{ padding:'18px 20px', borderRadius: 12, border:`1px solid ${C.ruleSoft}`, background: C.paper2 }}>
              <div style={{ fontFamily: F.mono, fontSize: 10, letterSpacing:'.2em', textTransform:'uppercase', color: C.inkFaint }}>{s.k}</div>
              <div style={{ fontFamily: F.serif, fontStyle:'italic', fontSize: 40, color: C.ink, lineHeight: 1, margin:'4px 0 2px' }}>{s.v}</div>
              <div style={{ fontFamily: F.sans, fontSize: 12, color: C.inkSoft }}>{s.l}</div>
            </div>
          ))}
        </div>

        <div style={{ display:'flex', alignItems:'baseline', gap: 14, marginBottom: 14 }}>
          <div style={{ fontFamily: F.mono, fontSize: 10, letterSpacing:'.22em', textTransform:'uppercase', color: C.inkFaint }}>All experiments</div>
          <div style={{ display:'flex', gap: 6, marginLeft:'auto' }}>
            {['All','Running','Analysed','Drafts'].map((t,i) => (
              <span key={t} style={{ fontFamily: F.sans, fontSize: 12, padding:'5px 10px', borderRadius: 999, background: i===0 ? C.ink : 'transparent', color: i===0 ? C.paper : C.inkSoft, border: i===0 ? 'none' : `1px solid ${C.rule}`, cursor:'pointer' }}>{t}</span>
            ))}
          </div>
        </div>

        <div style={{ border:`1px solid ${C.rule}`, borderRadius: 12, overflow:'hidden', background: C.paper }}>
          <div style={{ display:'grid', gridTemplateColumns:'1.6fr 1fr 140px 140px 80px 40px', padding:'14px 20px', borderBottom:`1px solid ${C.ruleSoft}`, background: C.paper2, fontFamily: F.mono, fontSize: 10, letterSpacing:'.18em', textTransform:'uppercase', color: C.inkFaint }}>
            <div>Experiment</div><div>Design</div><div>Progress</div><div>Status</div><div>Updated</div><div></div>
          </div>
          {PROJECTS.map((p,i) => (
            <div key={p.id} onClick={() => go('chat')} style={{ display:'grid', gridTemplateColumns:'1.6fr 1fr 140px 140px 80px 40px', padding:'18px 20px', borderBottom: i < PROJECTS.length-1 ? `1px solid ${C.ruleSoft}` : 'none', alignItems:'center', cursor:'pointer' }}>
              <div>
                <div style={{ fontFamily: F.serif, fontStyle:'italic', fontSize: 22, color: C.ink }}>{p.name}</div>
                <div style={{ fontFamily: F.sans, fontSize: 12, color: C.inkFaint, marginTop: 2 }}>{p.id} · {p.owner}</div>
              </div>
              <div style={{ fontFamily: F.mono, fontSize: 12, color: C.inkSoft }}>{p.meta}</div>
              <div>
                <div style={{ display:'flex', alignItems:'center', gap: 10 }}>
                  <div style={{ width: 70, height: 4, background: C.paper3, borderRadius: 2, overflow:'hidden' }}>
                    <div style={{ width: (p.progress/p.total*100)+'%', height:'100%', background: p.status==='running' ? C.clay : p.status==='analysed' ? C.moss : C.inkFaint }}/>
                  </div>
                  <span style={{ fontFamily: F.mono, fontSize: 11, color: C.inkSoft }}>{p.progress}/{p.total}</span>
                </div>
              </div>
              <div><StatusPill s={p.status}/></div>
              <div style={{ fontFamily: F.mono, fontSize: 11, color: C.inkFaint }}>{p.updated}</div>
              <div style={{ color: C.inkFaint, justifySelf:'end' }}><Icon name="dots" size={16}/></div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Screen_Empty({ go }) {
  const [text, setText] = React.useState('');
  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', background: C.paper, overflow:'auto' }}>
      <TopBar
        breadcrumb="new experiment · blank"
        title={<>A new <em style={{ color: C.clayInk }}>experiment</em>.</>}
        actions={<><Btn variant="ghost" onClick={() => go('projects')}>Cancel</Btn></>}
      />
      <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', padding:'40px 60px' }}>
        <div style={{ maxWidth: 720, width:'100%', textAlign:'center' }}>
          <div style={{ width: 96, height: 96, margin:'0 auto 44px', display:'flex', alignItems:'center', justifyContent:'center', position:'relative' }}>
            <svg width="96" height="96" viewBox="0 0 96 96">
              <g fill={C.ink}>
                <circle cx="24" cy="52" r="2.4"/><circle cx="44" cy="32" r="2.4"/>
                <circle cx="68" cy="46" r="2.4"/><circle cx="34" cy="68" r="2.4"/>
                <circle cx="78" cy="66" r="2.4"/>
              </g>
              <circle cx="52" cy="50" r="5" fill={C.clay}/>
              <circle cx="52" cy="50" r="13" fill="none" stroke={C.clay} strokeWidth="1" opacity=".4"/>
              <circle cx="52" cy="50" r="22" fill="none" stroke={C.clay} strokeWidth="0.7" opacity=".2"/>

      />

        ))}
      </div>
      <div style={{ flex:1, overflow:'auto', padding:'28px 36px', display:'grid', gridTemplateColumns:'1fr 300px', gap: 28 }}>
        <div style={{ background: C.paper, border:`1px solid ${C.ruleSoft}`, borderRadius: 12, padding: 30 }}>
          <div style={{ display:'flex', justifyContent:'space-between', marginBottom: 18 }}>
            <div>
              <div style={{ fontFamily: F.mono, fontSize: 10, letterSpacing:'.22em', textTransform:'uppercase', color: C.inkFaint }}>yield surface · isometric</div>
              <div style={{ fontFamily: F.serif, fontStyle:'italic', fontSize: 24, color: C.ink, marginTop: 2 }}>What the answer looks like</div>
            </div>
            <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint }}>view · 25° elev · 40° azim</div>
          </div>
          <svg viewBox="0 0 720 480" style={{ width:'100%', aspectRatio:'3/2' }}>
            {/* ground grid */}
            <g stroke={C.rule} strokeWidth="0.7" fill="none">
              {Array.from({length:9}).map((_,i) => {
                const t = i/8;
                // a simple axonometric grid
                const x1 = 100 + t*360, y1 = 380 - t*90;
                const x2 = 460 + t*0,   y2 = 290 - t*0;
                // line along F
                return null;
              })}
            </g>
            {/* mesh surface - parametric grid of small polygons */}
            {(() => {
              const cells = [];
              const nx = 10, ny = 10;
              // yield model ~ 56 + (T+1)/2 * 4.2 + (F+1)/2 * 2.6 - 1.2*T*F (scaled)
              const proj = (ix, iy) => {
                const u = ix/nx, v = iy/ny;
                const T = -1 + 2*u, F = -1 + 2*v;
                const y = 60 + 2.1*T + 1.3*F - 0.6*T*F + 2.8*(1 - ((T-0.8)**2 + (F-0.4)**2));
                // isometric
                const baseX = 120 + u*460;
                const baseY = 400 - v*80 - (1-u)*30;
                const h = (y - 55) * 7;
                return { x: baseX, y: baseY - h, yield: y };
              };
              // base grid (no height) for plane
              for (let iy = 0; iy < ny; iy++) for (let ix = 0; ix < nx; ix++) {
                const p00 = proj(ix, iy), p10 = proj(ix+1, iy), p11 = proj(ix+1, iy+1), p01 = proj(ix, iy+1);
                const avg = (p00.yield + p10.yield + p11.yield + p01.yield)/4;
                // map yield 56..66 -> color
                const t = Math.max(0, Math.min(1, (avg-56)/10));
                const r = Math.round(245 - t*140);
                const g = Math.round(236 - t*110);
                const b = Math.round(226 - t*145);
                cells.push(
                  <polygon key={`${ix}-${iy}`} points={`${p00.x},${p00.y} ${p10.x},${p10.y} ${p11.x},${p11.y} ${p01.x},${p01.y}`} fill={`rgb(${r},${g},${b})`} stroke={C.clay} strokeWidth="0.4" strokeOpacity=".5"/>
                );
              }
              return cells;
            })()}

            {[['Catalyst','1.0 %', 'fixed'],['T window','160–200 °C','full'],['F window','2.0–4.0 L/min','full']].map(([k,v,h]) => (
              <div key={k} style={{ display:'flex', justifyContent:'space-between', padding:'8px 0', fontFamily: F.mono, fontSize: 12, borderBottom:`1px dashed ${C.ruleSoft}` }}>
                <span style={{ color: C.inkSoft }}>{k}</span>
                <span style={{ color: C.ink }}>{v}</span>
              </div>
            ))}
          </div>
          <div style={{ background: C.paper, border:`1px solid ${C.ruleSoft}`, borderRadius: 12, padding: 20 }}>
            <div style={{ fontFamily: F.mono, fontSize: 10, letterSpacing:'.22em', textTransform:'uppercase', color: C.inkFaint, marginBottom: 10 }}>What to look at</div>

            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ==================================
// App bootstrap
// ==================================

const SCREENS = [
  { id:'projects',  label:'Projects' },
  { id:'empty',     label:'New · empty' },
  { id:'chat',      label:'Agent chat' },
  { id:'runsheet',  label:'Run-sheet' },
  { id:'entry',     label:'Enter result' },
  { id:'effects',   label:'Effects' },
  { id:'contour',   label:'Contour' },
  { id:'surface',   label:'3D surface' },
  { id:'settings',  label:'Settings' },
];

function App() {
  const init = (typeof localStorage !== 'undefined' && localStorage.getItem('factorial:screen')) || 'projects';
  const [screen, setScreen] = React.useState(init);
  const [history, setHistory] = React.useState([init]);
  const [hIdx, setHIdx] = React.useState(0);

  const go = (s) => {
    const next = history.slice(0, hIdx+1); next.push(s);
    setHistory(next); setHIdx(next.length-1); setScreen(s);
    try { localStorage.setItem('factorial:screen', s); } catch(e){}
  };
  const back = () => { if (hIdx > 0) { const ni = hIdx-1; setHIdx(ni); setScreen(history[ni]); } };
  const fwd  = () => { if (hIdx < history.length-1) { const ni = hIdx+1; setHIdx(ni); setScreen(history[ni]); } };

  const project = { name: 'Yield · Reactor B', meta: '2² · 8 runs · 6 done' };
  const inProject = !['projects','empty','settings'].includes(screen);

  const urlMap = {
    projects:'/projects', empty:'/projects/new', chat:'/yield-q2/plan', runsheet:'/yield-q2/runs',
    entry:'/yield-q2/runs/07', effects:'/yield-q2/analysis/effects',
    contour:'/yield-q2/analysis/contour', surface:'/yield-q2/analysis/surface', settings:'/settings',
  };

  const map = {
    projects: <Screen_Projects go={go}/>,
    empty: <Screen_Empty go={go}/>,
    chat: <Screen_Chat go={go} project={project}/>,
    runsheet: <Screen_Runsheet go={go} project={project}/>,
    entry: <Screen_Entry go={go} project={project}/>,
    effects: <Screen_Effects go={go} project={project}/>,
    contour: <Screen_Contour go={go} project={project}/>,
    surface: <Screen_Surface go={go} project={project}/>,
    settings: <Screen_Settings go={go}/>,
  };

  return (
    <div className="stage">
      <div className="proto-meta">
        <span className="dot"></span><span>Prototype · v1</span>
        <span>·</span>
        <span className="crumb">factori.al · in-app</span>
      </div>
      <Chrome url={urlMap[screen]} onBack={back} onForward={fwd}>
        <Sidebar current={screen} go={go} project={inProject ? project : null}/>
        {map[screen]}
      </Chrome>
      <div className="screen-nav">
        {SCREENS.map(s => (
          <span key={s.id} className={screen===s.id?'active':''} onClick={() => go(s.id)}>{s.label}</span>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
