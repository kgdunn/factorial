server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers ---
    # NOTE: CSP is managed by SvelteKit (see kit.csp in svelte.config.js), which emits
    # a <meta http-equiv="content-security-policy"> tag with per-build hashes for its
    # inline bootstrap script. Do not add a CSP response header here — it would merge
    # with the meta (most restrictive wins) and block SvelteKit's inline script.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
