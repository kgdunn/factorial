services:
  app:
    build: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - NEO4J_URI=bolt://neo4j:7687
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    # Caps the tool worker subprocesses so a pathological DOE call
    # cannot starve the host. Matches the VPS-guide recommendation of
    # 4 vCPU / 8 GB. Tune down if you run on a smaller instance.
    cpus: "3.5"
    mem_limit: 6g
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # TODO: when MCP_ENABLED goes live in production, break the MCP router
  # out into its own service (same image, uvicorn with a narrower route
  # include) and give it a lower cpus/mem_limit so abusive MCP clients
  # cannot take the chat UI down with them.

  # -----------------------------------------------------------------------
  # Blue-green backend pair (zero-downtime deploys).
  #
  # These services are gated behind the ``blue`` / ``green`` Compose
  # profiles so they only start when explicitly requested (e.g.
  # ``docker compose --profile green up -d app-green``). The plain
  # ``app`` service above stays the default for single-stack deploys.
  #
  # Shared Postgres / Neo4j / frontend — only the Python API container
  # is duplicated. Deploys flip the host-level Caddy ``reverse_proxy``
  # upstream between 8000 (blue) and 8001 (green). See
  # ``scripts/deploy-blue-green.sh`` and
  # ``docs/deployment/vps-guide.md`` for the operator runbook.
  # -----------------------------------------------------------------------
  app-blue:
    profiles: ["blue"]
    build: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - NEO4J_URI=bolt://neo4j:7687
      - APP_COLOR=blue
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    cpus: "3.5"
    mem_limit: 6g
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app-green:
    profiles: ["green"]
    build: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - NEO4J_URI=bolt://neo4j:7687
      - APP_COLOR=green
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    cpus: "3.5"
    mem_limit: 6g
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-doe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doe_password}
      POSTGRES_DB: ${POSTGRES_DB:-doe_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-doe_user} -d ${POSTGRES_DB:-doe_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_password}
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-neo4j_password} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Redis — uncomment when needed for sessions/caching
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

volumes:
  postgres_data:
  neo4j_data:
  # redis_data:
