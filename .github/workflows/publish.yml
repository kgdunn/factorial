name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - "backend/pyproject.toml"  # Only run when this file changes

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write    # Required for trusted publishing
      contents: write    # Required for creating tags and releases

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to diff

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check if version changed
        id: version_check
        run: |
          pip install tomli
          NEW=$(python -c "import tomli; print(tomli.load(open('backend/pyproject.toml','rb'))['project']['version'])")
          git show HEAD~1:backend/pyproject.toml > /tmp/old_pyproject.toml 2>/dev/null || echo "first_run"
          OLD=$(python -c "
          import tomli, sys
          try:
              print(tomli.load(open('/tmp/old_pyproject.toml','rb'))['project']['version'])
          except:
              print('none')
          ")
          echo "old=$OLD new=$NEW"
          if [ "$OLD" != "$NEW" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEW" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.version_check.outputs.changed == 'true'
        run: |
          pip install build
          python -m build backend/

      - name: Publish to PyPI
        if: steps.version_check.outputs.changed == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: backend/dist/

      - name: Create GitHub Release
        if: steps.version_check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version_check.outputs.version }}" \
            --title "v${{ steps.version_check.outputs.version }}" \
            --generate-notes
