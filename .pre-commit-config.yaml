repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        name: ruff-check (backend)
        args: [--config=backend/pyproject.toml]
        files: ^backend/(src|tests)/.*\.py$
      - id: ruff-format
        name: ruff-format (backend)
        args: [--config=backend/pyproject.toml, --check]
        files: ^backend/(src|tests)/.*\.py$
